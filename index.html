<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Almoxarifado — Controle de Materiais</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link href="style.css" rel="stylesheet" />
</head>
<body>

  <nav class="navbar navbar-dark bg-dark px-3 py-2">
    <span class="navbar-brand mb-0 h6 d-flex align-items-center gap-2">
      📦 Almoxarifado
    </span>
    <span class="text-secondary small">
      Itens em estoque:
      <strong class="text-success" id="status-count">—</strong>
    </span>
  </nav>

  <div class="container py-4" style="max-width: 860px;">

    <div class="mb-4">
      <p class="text-muted small mb-1 text-uppercase fw-semibold">Unicesumar · Almoxarifado</p>
      <h1 class="h3 fw-bold mb-1">Controle de Materiais</h1>
      <p class="text-muted mb-0">Cadastre e consulte os materiais do estoque em tempo real.</p>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-header d-flex align-items-center gap-2">
        <span>📦</span>
        <strong>Novo Material</strong>
      </div>
      <div class="card-body">
        <div class="row g-3 align-items-end">

          <div class="col-12 col-md">
            <label for="input-nome" class="form-label fw-semibold">Nome do Material</label>
            <input
              type="text"
              class="form-control"
              id="input-nome"
              placeholder="ex.: Caneta Azul, Caneta Preta…"
              autocomplete="off"
            />
          </div>

          <div class="col-12 col-md-3">
            <label for="input-quantidade" class="form-label fw-semibold">Quantidade</label>
            <input
              type="number"
              class="form-control"
              id="input-quantidade"
              placeholder="0"
              min="0"
            />
          </div>

          <div class="col-12 col-md-auto">
            <button id="btn-cadastrar" class="btn btn-primary w-100">
              ＋ Cadastrar
            </button>
          </div>

        </div>

        <!-- Feedback -->
        <p id="toast-msg" class="mt-2 mb-0"></p>
      </div>
    </div>

    <!-- Card de Listagem -->
    <div class="card shadow-sm">
      <div class="card-header d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center gap-2">
          <span>🗂️</span>
          <strong>Materiais em Estoque</strong>
        </div>
        <span class="badge bg-primary badge-count" id="badge-count">0 itens</span>
      </div>

      <div class="table-responsive">
        <table class="table table-hover table-bordered mb-0">
          <thead class="table-light">
            <tr>
              <th scope="col" style="width: 100px;">ID</th>
              <th scope="col">Material</th>
              <th scope="col" class="text-end" style="width: 120px;">Qtd.</th>
            </tr>
          </thead>
          <tbody id="lista-materiais">
          </tbody>
        </table>

        <div id="table-state" class="text-center py-5 text-muted">
          <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
          Carregando materiais…
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="main.js"></script>
</body>
</html>
